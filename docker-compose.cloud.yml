# ====================================================
# CineBook - Movie Ticket Booking System
# Docker Compose for Full Cloud Deployment
# (Neon PostgreSQL + CloudAMQP RabbitMQ)
#
# Run:  docker compose -f docker-compose.cloud.yml up -d
# Open: http://localhost:5173
# Login: admin@movieticket.com / admin123
#
# Required .env variables:
#   DATABASE_URL=postgresql://user:pass@ep-xyz.neon.tech/dbname?sslmode=require
#   RABBITMQ_URL=amqps://user:pass@host.cloudamqp.com/vhost
#   REDIS_URL=redis://default:password@your-redis-host:6379
# ====================================================

services:
  # ==================== Microservices ====================
  auth-service:
    image: arun498/auth-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: mtbs-auth
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    restart: unless-stopped
    networks:
      - mtbs-network

  movie-service:
    image: arun498/movie-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.movie
    container_name: mtbs-movie
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL:-}
    restart: unless-stopped
    networks:
      - mtbs-network

  show-service:
    image: arun498/show-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.show
    container_name: mtbs-show
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL:-}
    restart: unless-stopped
    networks:
      - mtbs-network

  booking-service:
    image: arun498/booking-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.booking
    container_name: mtbs-booking
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL:-}
    restart: unless-stopped
    networks:
      - mtbs-network

  payment-service:
    image: arun498/payment-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.payment
    container_name: mtbs-payment
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL:-}
      - TICKET_SERVICE_URL=http://ticket-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    restart: unless-stopped
    networks:
      - mtbs-network

  ticket-service:
    image: arun498/ticket-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.ticket
    container_name: mtbs-ticket
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
    restart: unless-stopped
    networks:
      - mtbs-network

  notification-service:
    image: arun498/notification-service:3.9
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: mtbs-notification
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    restart: unless-stopped
    networks:
      - mtbs-network

  # ==================== API Gateway ====================
  api-gateway:
    image: arun498/api-gateway:3.9
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: mtbs-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - MOVIE_SERVICE_URL=http://movie-service:3002
      - SHOW_SERVICE_URL=http://show-service:3003
      - BOOKING_SERVICE_URL=http://booking-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - TICKET_SERVICE_URL=http://ticket-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      - auth-service
      - movie-service
      - show-service
      - booking-service
      - payment-service
      - ticket-service
      - notification-service
    restart: unless-stopped
    networks:
      - mtbs-network

  # ==================== Frontend ====================
  frontend:
    image: arun498/frontend:3.9
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mtbs-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - mtbs-network

networks:
  mtbs-network:
    driver: bridge
