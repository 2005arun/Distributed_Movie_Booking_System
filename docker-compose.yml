# ====================================================
# CineBook - Movie Ticket Booking System
# Docker Compose (PostgreSQL + Redis + RabbitMQ)
#
# Run:  docker-compose up --build
# Open: http://localhost:5173
# Login: admin@movieticket.com / admin123
# ====================================================

services:
  # ==================== Database ====================
  postgres:
    image: postgres:16-alpine
    container_name: mtbs-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=movieticket
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mtbs-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d movieticket" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==================== Microservices ====================
  auth-service:
    image: arun498/auth-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: mtbs-auth
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  movie-service:
    image: arun498/movie-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.movie
    container_name: mtbs-movie
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  show-service:
    image: arun498/show-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.show
    container_name: mtbs-show
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  booking-service:
    image: arun498/booking-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.booking
    container_name: mtbs-booking
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  payment-service:
    image: arun498/payment-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.payment
    container_name: mtbs-payment
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379
      - TICKET_SERVICE_URL=http://ticket-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  ticket-service:
    image: arun498/ticket-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.ticket
    container_name: mtbs-ticket
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  notification-service:
    image: arun498/notification-service:4.0
    build:
      context: .
      dockerfile: Dockerfile.notification
    container_name: mtbs-notification
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=movieticket
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_SENDER_EMAIL=${BREVO_SENDER_EMAIL:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  # ==================== API Gateway ====================
  api-gateway:
    image: arun498/api-gateway:4.0
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: mtbs-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - MOVIE_SERVICE_URL=http://movie-service:3002
      - SHOW_SERVICE_URL=http://show-service:3003
      - BOOKING_SERVICE_URL=http://booking-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - TICKET_SERVICE_URL=http://ticket-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      - auth-service
      - movie-service
      - show-service
      - booking-service
      - payment-service
      - ticket-service
      - notification-service
    restart: unless-stopped
    networks:
      - mtbs-network

  # ==================== Cache ====================
  redis:
    image: redis:7-alpine
    container_name: mtbs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mtbs-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== Message Queue ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mtbs-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - mtbs-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Frontend ====================
  frontend:
    image: arun498/frontend:4.0
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mtbs-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - mtbs-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  mtbs-network:
    driver: bridge
